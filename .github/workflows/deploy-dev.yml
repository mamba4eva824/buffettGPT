name: Deploy to Dev

on:
  push:
    branches:
      - dev  # Auto-deploy when pushing to dev
  workflow_dispatch:  # Allow manual trigger
    inputs:
      test_smoke_failure:
        description: 'Force smoke test failure (for testing CI/CD gate)'
        required: false
        default: false
        type: boolean
      build_investment_research:
        description: 'Build Investment Research Docker Lambda'
        required: false
        default: false
        type: boolean
      # NOTE: build_prediction_ensemble removed (2025-01) - archived
      # NOTE: build_followup_action removed (2026-05) - Bedrock action group cleanup
      # See: archived/prediction_ensemble/
      build_analysis_followup:
        description: 'Build Analysis Followup Docker Lambda'
        required: false
        default: false
        type: boolean
      build_all_docker:
        description: 'Build ALL Docker Lambdas (overrides individual selections)'
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: dev
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  test-frontend:
    name: Frontend Tests (Placeholder)
    runs-on: ubuntu-latest
    # NOTE: Frontend tests are temporarily disabled while test infrastructure is being set up.
    # Tests exist in frontend/src/__tests__/ but are not yet integrated into CI/CD.
    # To enable: remove 'if: false' and uncomment the test steps below.
    if: false  # Disabled - tests are placeholders

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # TODO: Enable when frontend tests are ready
      # - name: Run tests
      #   working-directory: frontend
      #   run: npm run test:run

      - name: Placeholder - Tests Disabled
        run: echo "Frontend tests are placeholders - see frontend/src/__tests__/"

  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      investment_research_changed: ${{ steps.changes.outputs.investment_research }}
      # NOTE: prediction_ensemble_changed removed (2025-01) - archived
      # NOTE: followup_action_changed removed (2026-05) - Bedrock action group cleanup
      analysis_followup_changed: ${{ steps.changes.outputs.analysis_followup }}
      any_docker_changed: ${{ steps.changes.outputs.any_docker }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit for diff

      - name: Detect changed paths
        id: changes
        run: |
          # For push events, compare with previous commit
          # For workflow_dispatch, default to false (use manual inputs)
          if [[ "${{ github.event_name }}" == "push" ]]; then
            IR_CHANGED=$(git diff --name-only HEAD^ HEAD | grep -q "chat-api/backend/lambda/investment_research/" && echo "true" || echo "false")
            # NOTE: prediction_ensemble removed (2025-01) - archived
            # NOTE: followup_action removed (2026-05) - Bedrock action group cleanup
            AF_CHANGED=$(git diff --name-only HEAD^ HEAD | grep -q "chat-api/backend/lambda/analysis_followup/" && echo "true" || echo "false")
          else
            IR_CHANGED="false"
            AF_CHANGED="false"
          fi

          echo "investment_research=$IR_CHANGED" >> $GITHUB_OUTPUT
          echo "analysis_followup=$AF_CHANGED" >> $GITHUB_OUTPUT
          echo "any_docker=$([[ $IR_CHANGED == 'true' || $AF_CHANGED == 'true' ]] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

          echo "Investment Research changed: $IR_CHANGED"
          echo "Analysis Followup changed: $AF_CHANGED"

  build-backend:
    name: Build Backend Lambda Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Lambda Layer
        working-directory: chat-api/backend
        run: |
          chmod +x scripts/build_layer.sh
          ./scripts/build_layer.sh

      - name: Build Lambda packages
        working-directory: chat-api/backend
        run: |
          chmod +x scripts/build_lambdas.sh
          ./scripts/build_lambdas.sh

      # NOTE: Build ML Layer and Build Data Fetcher Action Lambda steps removed (2025-01)
      # These were part of the prediction ensemble that was archived.
      # See: archived/prediction_ensemble/

      - name: Upload Lambda packages
        uses: actions/upload-artifact@v4
        with:
          name: lambda-packages
          path: chat-api/backend/build/*.zip
          retention-days: 1

  deploy-infrastructure:
    name: Deploy Infrastructure with Terraform
    runs-on: ubuntu-latest
    needs: [build-backend]  # Removed test-frontend dependency (tests disabled)

    outputs:
      http_api_endpoint: ${{ steps.terraform-output.outputs.http_api_endpoint }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Lambda packages
        uses: actions/download-artifact@v4
        with:
          name: lambda-packages
          path: chat-api/backend/build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create/Update Secrets in AWS Secrets Manager
        run: |
          # Create or update Google OAuth secret (reusing staging credentials)
          aws secretsmanager describe-secret --secret-id buffett-dev-google-oauth 2>/dev/null || \
          aws secretsmanager create-secret \
            --name buffett-dev-google-oauth \
            --description "Google OAuth credentials for dev environment" \
            --region ${{ env.AWS_REGION }}

          aws secretsmanager put-secret-value \
            --secret-id buffett-dev-google-oauth \
            --secret-string "{\"client_id\":\"${{ secrets.GOOGLE_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.GOOGLE_CLIENT_SECRET }}\"}" \
            --region ${{ env.AWS_REGION }}

          # Create or update JWT secret (reusing staging secret)
          aws secretsmanager describe-secret --secret-id buffett-dev-jwt-secret 2>/dev/null || \
          aws secretsmanager create-secret \
            --name buffett-dev-jwt-secret \
            --description "JWT signing secret for dev environment" \
            --region ${{ env.AWS_REGION }}

          aws secretsmanager put-secret-value \
            --secret-id buffett-dev-jwt-secret \
            --secret-string "${{ secrets.JWT_SECRET }}" \
            --region ${{ env.AWS_REGION }}

          # NOTE: Pinecone API key secret removed (2025-01)
          # Knowledge Base and Pinecone integration deprecated

          echo "AWS Secrets Manager secrets created/updated successfully"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.1
          terraform_wrapper: false  # Needed to capture outputs

      - name: Terraform Init
        working-directory: chat-api/terraform/environments/dev
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Validate
        working-directory: chat-api/terraform/environments/dev
        run: terraform validate

      - name: Terraform Plan
        working-directory: chat-api/terraform/environments/dev
        run: |
          set +e
          terraform plan -out=tfplan \
            -var="enable_authentication=true" \
            -var="enable_monitoring=true" \
            -var="google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -var="google_client_secret=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -detailed-exitcode
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 0 ] || [ $EXIT_CODE -eq 2 ]; then
            echo "Terraform plan succeeded"
            exit 0
          else
            echo "Terraform plan failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Terraform Apply
        working-directory: chat-api/terraform/environments/dev
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        id: terraform-output
        working-directory: chat-api/terraform/environments/dev
        run: |
          HTTP_ENDPOINT=$(terraform output -raw http_api_endpoint)

          echo "http_api_endpoint=$HTTP_ENDPOINT" >> $GITHUB_OUTPUT

          echo "API Endpoints:"
          echo "  HTTP API: $HTTP_ENDPOINT"

  build-docker-lambdas:
    name: Build Docker Lambda - ${{ matrix.lambda.name }}
    runs-on: ubuntu-latest  # x86_64 architecture - correct for Lambda
    needs: [deploy-infrastructure, detect-changes]
    # Only run if any Docker Lambda needs building
    if: |
      needs.detect-changes.outputs.any_docker_changed == 'true' ||
      inputs.build_all_docker == true ||
      inputs.build_investment_research == true ||
      inputs.build_analysis_followup == true
    strategy:
      fail-fast: false  # Continue building other Lambdas if one fails
      matrix:
        lambda:
          # dockerfile_dir = build context, dockerfile_path = Dockerfile
          # location relative to the context. Most Lambdas use the standard
          # pattern (context = the lambda dir, Dockerfile inside it). The
          # analysis-followup wrapper needs a wider context (chat-api/backend)
          # so its Dockerfile can COPY src/handlers/ + src/utils/ +
          # investment_research/ alongside the wrapper code.
          - name: investment-research
            dockerfile_dir: chat-api/backend/lambda/investment_research
            dockerfile_path: Dockerfile
            ecr_repo: buffett/investment-research
            change_output: investment_research_changed
            manual_input: build_investment_research
            has_health_endpoint: true
          # NOTE: prediction-ensemble removed (2025-01) - archived
          # NOTE: followup-action removed (2026-05) - Bedrock action group cleanup
          # See: archived/prediction_ensemble/
          - name: analysis-followup
            dockerfile_dir: chat-api/backend
            dockerfile_path: lambda/analysis_followup/Dockerfile
            ecr_repo: buffett/analysis-followup
            change_output: analysis_followup_changed
            manual_input: build_analysis_followup
            has_health_endpoint: false

    steps:
      - name: Check if this Lambda should be built
        id: should-build
        env:
          LAMBDA_NAME: ${{ matrix.lambda.name }}
          BUILD_ALL: ${{ inputs.build_all_docker }}
          BUILD_IR: ${{ inputs.build_investment_research }}
          BUILD_AF: ${{ inputs.build_analysis_followup }}
          IR_CHANGED: ${{ needs.detect-changes.outputs.investment_research_changed }}
          AF_CHANGED: ${{ needs.detect-changes.outputs.analysis_followup_changed }}
        run: |
          # Build if:
          # 1. build_all_docker is true, OR
          # 2. This Lambda's manual input is true, OR
          # 3. This Lambda's path changed (push event)

          SHOULD_BUILD="false"

          # Check build_all_docker
          if [[ "$BUILD_ALL" == "true" ]]; then
            SHOULD_BUILD="true"
            echo "Building $LAMBDA_NAME: build_all_docker=true"
          fi

          # Check manual input for this specific Lambda
          if [[ "$LAMBDA_NAME" == "investment-research" && "$BUILD_IR" == "true" ]]; then
            SHOULD_BUILD="true"
            echo "Building $LAMBDA_NAME: manual input selected"
          fi
          # NOTE: prediction-ensemble removed (2025-01) - archived
          # NOTE: followup-action removed (2026-05) - Bedrock action group cleanup
          if [[ "$LAMBDA_NAME" == "analysis-followup" && "$BUILD_AF" == "true" ]]; then
            SHOULD_BUILD="true"
            echo "Building $LAMBDA_NAME: manual input selected"
          fi

          # Check if path changed (push event)
          if [[ "$LAMBDA_NAME" == "investment-research" && "$IR_CHANGED" == "true" ]]; then
            SHOULD_BUILD="true"
            echo "Building $LAMBDA_NAME: path changed"
          fi
          # NOTE: prediction-ensemble removed (2025-01) - archived
          # NOTE: followup-action removed (2026-05) - Bedrock action group cleanup
          if [[ "$LAMBDA_NAME" == "analysis-followup" && "$AF_CHANGED" == "true" ]]; then
            SHOULD_BUILD="true"
            echo "Building $LAMBDA_NAME: path changed"
          fi

          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT

          if [[ "$SHOULD_BUILD" == "false" ]]; then
            echo "Skipping $LAMBDA_NAME: no changes detected and not manually selected"
          fi

      - name: Checkout code
        if: steps.should-build.outputs.should_build == 'true'
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: steps.should-build.outputs.should_build == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.should-build.outputs.should_build == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        if: steps.should-build.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: steps.should-build.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.lambda.dockerfile_dir }}
          file: ${{ matrix.lambda.dockerfile_dir }}/${{ matrix.lambda.dockerfile_path }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.lambda.ecr_repo }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.lambda.ecr_repo }}:latest
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.lambda.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.lambda.name }}
          provenance: false

      - name: Update Lambda function
        if: steps.should-build.outputs.should_build == 'true'
        run: |
          FUNCTION_NAME="buffett-${{ env.ENVIRONMENT }}-${{ matrix.lambda.name }}"
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ matrix.lambda.ecr_repo }}:${{ github.sha }}"

          # Update Lambda to use new image
          aws lambda update-function-code \
            --function-name $FUNCTION_NAME \
            --image-uri $IMAGE_URI \
            --region ${{ env.AWS_REGION }}

          # Wait for update to complete
          aws lambda wait function-updated \
            --function-name $FUNCTION_NAME \
            --region ${{ env.AWS_REGION }}

          echo "Lambda $FUNCTION_NAME updated with image: $IMAGE_URI"

      - name: Verify Lambda health
        if: steps.should-build.outputs.should_build == 'true' && matrix.lambda.has_health_endpoint == true
        run: |
          FUNCTION_NAME="buffett-${{ env.ENVIRONMENT }}-${{ matrix.lambda.name }}"

          # Get Function URL
          FUNC_URL=$(aws lambda get-function-url-config \
            --function-name $FUNCTION_NAME \
            --query 'FunctionUrl' --output text)

          # Test health endpoint
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${FUNC_URL}health")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Health check passed for $FUNCTION_NAME (HTTP $HTTP_STATUS)"
          else
            echo "Health check failed for $FUNCTION_NAME (HTTP $HTTP_STATUS)"
            exit 1
          fi

      - name: Skip health check (action group Lambda)
        if: steps.should-build.outputs.should_build == 'true' && matrix.lambda.has_health_endpoint == false
        run: |
          echo "Skipping health check for ${{ matrix.lambda.name }} - Bedrock action group Lambda (no HTTP endpoint)"
          echo "Lambda will be tested via Bedrock agent invocation"

      - name: Skip notification
        if: steps.should-build.outputs.should_build == 'false'
        run: |
          echo "Skipped ${{ matrix.lambda.name }} - no changes detected and not manually selected"

  smoke-tests:
    name: Post-Deployment Smoke Tests
    runs-on: ubuntu-latest
    needs: [build-docker-lambdas, detect-changes]
    # Always run smoke tests, even if Docker builds were skipped
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.build-docker-lambdas.result == 'success' || needs.build-docker-lambdas.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run smoke tests
        working-directory: chat-api/backend
        run: |
          chmod +x scripts/smoke_test.sh
          if [[ "${{ inputs.test_smoke_failure }}" == "true" ]]; then
            ./scripts/smoke_test.sh ${{ env.ENVIRONMENT }} --test-failure
          else
            ./scripts/smoke_test.sh ${{ env.ENVIRONMENT }}
          fi

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure, build-docker-lambdas, smoke-tests, detect-changes]
    if: always()

    steps:
      - name: Print deployment summary
        run: |
          echo "Dev Deployment Summary"
          echo "=============================="
          echo ""
          echo "Environment: dev"
          echo "HTTP API: ${{ needs.deploy-infrastructure.outputs.http_api_endpoint }}"
          echo ""
          echo "Docker Lambda Builds:"
          echo "  Investment Research changed: ${{ needs.detect-changes.outputs.investment_research_changed }}"
          echo "  Analysis Followup changed: ${{ needs.detect-changes.outputs.analysis_followup_changed }}"
          echo "  Build job result: ${{ needs.build-docker-lambdas.result }}"
          echo ""
          echo "Smoke Tests: ${{ needs.smoke-tests.result }}"
          echo ""
          echo "Frontend: Run locally with 'npm run dev' in the frontend directory"
          echo ""
          echo "To check deployment:"
          echo "   curl ${{ needs.deploy-infrastructure.outputs.http_api_endpoint }}/health"
