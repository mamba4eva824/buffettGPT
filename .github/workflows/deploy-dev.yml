name: Deploy to Dev

on:
  push:
    branches:
      - dev  # Auto-deploy when pushing to dev
  workflow_dispatch:  # Allow manual trigger
    inputs:
      test_smoke_failure:
        description: 'Force smoke test failure (for testing CI/CD gate)'
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: dev
  PYTHON_VERSION: '3.11'

jobs:
  build-backend:
    name: Build Backend Lambda Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Lambda Layer
        working-directory: chat-api/backend
        run: |
          chmod +x scripts/build_layer.sh
          ./scripts/build_layer.sh

      - name: Build Lambda packages
        working-directory: chat-api/backend
        run: |
          chmod +x scripts/build_lambdas.sh
          ./scripts/build_lambdas.sh

      - name: Build ML Layer
        working-directory: chat-api/backend
        run: |
          chmod +x scripts/build_ml_layer.sh
          ./scripts/build_ml_layer.sh

      - name: Build Data Fetcher Action Lambda
        working-directory: chat-api/backend
        run: |
          chmod +x scripts/build_data_fetcher_action.sh
          ./scripts/build_data_fetcher_action.sh

      - name: Upload Lambda packages
        uses: actions/upload-artifact@v4
        with:
          name: lambda-packages
          path: chat-api/backend/build/*.zip
          retention-days: 1

  deploy-infrastructure:
    name: Deploy Infrastructure with Terraform
    runs-on: ubuntu-latest
    needs: [build-backend]

    outputs:
      http_api_endpoint: ${{ steps.terraform-output.outputs.http_api_endpoint }}
      websocket_api_endpoint: ${{ steps.terraform-output.outputs.websocket_api_endpoint }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Lambda packages
        uses: actions/download-artifact@v4
        with:
          name: lambda-packages
          path: chat-api/backend/build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create/Update Secrets in AWS Secrets Manager
        run: |
          # Create or update Google OAuth secret (reusing staging credentials)
          aws secretsmanager describe-secret --secret-id buffett-dev-google-oauth 2>/dev/null || \
          aws secretsmanager create-secret \
            --name buffett-dev-google-oauth \
            --description "Google OAuth credentials for dev environment" \
            --region ${{ env.AWS_REGION }}

          aws secretsmanager put-secret-value \
            --secret-id buffett-dev-google-oauth \
            --secret-string "{\"client_id\":\"${{ secrets.GOOGLE_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.GOOGLE_CLIENT_SECRET }}\"}" \
            --region ${{ env.AWS_REGION }}

          # Create or update JWT secret (reusing staging secret)
          aws secretsmanager describe-secret --secret-id buffett-dev-jwt-secret 2>/dev/null || \
          aws secretsmanager create-secret \
            --name buffett-dev-jwt-secret \
            --description "JWT signing secret for dev environment" \
            --region ${{ env.AWS_REGION }}

          aws secretsmanager put-secret-value \
            --secret-id buffett-dev-jwt-secret \
            --secret-string "${{ secrets.JWT_SECRET }}" \
            --region ${{ env.AWS_REGION }}

          # Create or update Pinecone API key (reusing staging key)
          aws secretsmanager describe-secret --secret-id buffett-dev-pinecone-api-key 2>/dev/null || \
          aws secretsmanager create-secret \
            --name buffett-dev-pinecone-api-key \
            --description "Pinecone API key for dev environment" \
            --region ${{ env.AWS_REGION }}

          aws secretsmanager put-secret-value \
            --secret-id buffett-dev-pinecone-api-key \
            --secret-string "${{ secrets.PINECONE_API_KEY }}" \
            --region ${{ env.AWS_REGION }}

          echo "AWS Secrets Manager secrets created/updated successfully"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.1
          terraform_wrapper: false  # Needed to capture outputs

      - name: Terraform Init
        working-directory: chat-api/terraform/environments/dev
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Validate
        working-directory: chat-api/terraform/environments/dev
        run: terraform validate

      - name: Terraform Plan
        working-directory: chat-api/terraform/environments/dev
        run: |
          set +e
          terraform plan -out=tfplan \
            -var="enable_authentication=true" \
            -var="google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -var="google_client_secret=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="pinecone_api_key=${{ secrets.PINECONE_API_KEY }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -detailed-exitcode
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 0 ] || [ $EXIT_CODE -eq 2 ]; then
            echo "Terraform plan succeeded"
            exit 0
          else
            echo "Terraform plan failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Terraform Apply
        working-directory: chat-api/terraform/environments/dev
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        id: terraform-output
        working-directory: chat-api/terraform/environments/dev
        run: |
          HTTP_ENDPOINT=$(terraform output -raw http_api_endpoint)
          WS_ENDPOINT=$(terraform output -raw websocket_api_endpoint)

          echo "http_api_endpoint=$HTTP_ENDPOINT" >> $GITHUB_OUTPUT
          echo "websocket_api_endpoint=$WS_ENDPOINT" >> $GITHUB_OUTPUT

          echo "API Endpoints:"
          echo "  HTTP API: $HTTP_ENDPOINT"
          echo "  WebSocket: $WS_ENDPOINT"

  build-docker-lambdas:
    name: Build & Deploy Docker Lambda Images
    runs-on: ubuntu-latest  # x86_64 architecture - correct for Lambda
    needs: [deploy-infrastructure]  # ECR repo must exist first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Investment Research Docker image
        working-directory: chat-api/backend/lambda/investment_research
        run: |
          # Build with git SHA tag for traceability
          docker build \
            --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            -t investment-research:${{ github.sha }} \
            -t investment-research:latest \
            .

          # Verify architecture (should be amd64 on ubuntu-latest)
          ARCH=$(docker inspect investment-research:${{ github.sha }} --format '{{.Architecture}}')
          echo "Built image architecture: $ARCH"
          if [ "$ARCH" != "amd64" ]; then
            echo "ERROR: Image architecture is $ARCH, expected amd64"
            exit 1
          fi

      - name: Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: buffett/investment-research
        run: |
          # Tag for ECR
          docker tag investment-research:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker tag investment-research:latest $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # Push both tags
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "Pushed image: $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"

      - name: Update Lambda function
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: buffett/investment-research
        run: |
          # Update Lambda to use new image
          aws lambda update-function-code \
            --function-name buffett-${{ env.ENVIRONMENT }}-investment-research \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            --region ${{ env.AWS_REGION }}

          # Wait for update to complete
          aws lambda wait function-updated \
            --function-name buffett-${{ env.ENVIRONMENT }}-investment-research \
            --region ${{ env.AWS_REGION }}

          echo "Lambda updated successfully"

      - name: Verify Lambda health
        run: |
          # Get Function URL
          FUNC_URL=$(aws lambda get-function-url-config \
            --function-name buffett-${{ env.ENVIRONMENT }}-investment-research \
            --query 'FunctionUrl' --output text)

          # Test health endpoint
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${FUNC_URL}health")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Health check passed (HTTP $HTTP_STATUS)"
          else
            echo "Health check failed (HTTP $HTTP_STATUS)"
            exit 1
          fi

  smoke-tests:
    name: Post-Deployment Smoke Tests
    runs-on: ubuntu-latest
    needs: [build-docker-lambdas]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run smoke tests
        working-directory: chat-api/backend
        run: |
          chmod +x scripts/smoke_test.sh
          if [[ "${{ inputs.test_smoke_failure }}" == "true" ]]; then
            ./scripts/smoke_test.sh ${{ env.ENVIRONMENT }} --test-failure
          else
            ./scripts/smoke_test.sh ${{ env.ENVIRONMENT }}
          fi

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure, build-docker-lambdas, smoke-tests]
    if: always()

    steps:
      - name: Print deployment summary
        run: |
          echo "Dev Deployment Summary"
          echo "=============================="
          echo ""
          echo "Environment: dev"
          echo "HTTP API: ${{ needs.deploy-infrastructure.outputs.http_api_endpoint }}"
          echo "WebSocket: ${{ needs.deploy-infrastructure.outputs.websocket_api_endpoint }}"
          echo ""
          echo "Backend infrastructure deployed"
          echo "Lambda functions deployed"
          echo ""
          echo "Frontend: Run locally with 'npm run dev' in the frontend directory"
          echo ""
          echo "To check deployment:"
          echo "   curl ${{ needs.deploy-infrastructure.outputs.http_api_endpoint }}/health"
