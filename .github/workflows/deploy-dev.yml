name: Deploy to Dev

on:
  push:
    branches:
      - dev  # Auto-deploy when pushing to dev
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: dev
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  build-backend:
    name: Build Backend Lambda Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Lambda Layer
        working-directory: chat-api/backend
        run: |
          chmod +x scripts/build_layer.sh
          ./scripts/build_layer.sh

      - name: Build Lambda packages
        working-directory: chat-api/backend
        run: |
          chmod +x scripts/build_lambdas.sh
          ./scripts/build_lambdas.sh

      - name: Upload Lambda packages
        uses: actions/upload-artifact@v4
        with:
          name: lambda-packages
          path: chat-api/backend/build/*.zip
          retention-days: 1

  deploy-infrastructure:
    name: Deploy Infrastructure with Terraform
    runs-on: ubuntu-latest
    needs: [build-backend]

    outputs:
      http_api_endpoint: ${{ steps.terraform-output.outputs.http_api_endpoint }}
      websocket_api_endpoint: ${{ steps.terraform-output.outputs.websocket_api_endpoint }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Lambda packages
        uses: actions/download-artifact@v4
        with:
          name: lambda-packages
          path: chat-api/backend/build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create/Update Secrets in AWS Secrets Manager
        run: |
          # Create or update Google OAuth secret (reusing staging credentials)
          aws secretsmanager describe-secret --secret-id buffett-dev-google-oauth 2>/dev/null || \
          aws secretsmanager create-secret \
            --name buffett-dev-google-oauth \
            --description "Google OAuth credentials for dev environment" \
            --region ${{ env.AWS_REGION }}

          aws secretsmanager put-secret-value \
            --secret-id buffett-dev-google-oauth \
            --secret-string "{\"client_id\":\"${{ secrets.GOOGLE_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.GOOGLE_CLIENT_SECRET }}\"}" \
            --region ${{ env.AWS_REGION }}

          # Create or update JWT secret (reusing staging secret)
          aws secretsmanager describe-secret --secret-id buffett-dev-jwt-secret 2>/dev/null || \
          aws secretsmanager create-secret \
            --name buffett-dev-jwt-secret \
            --description "JWT signing secret for dev environment" \
            --region ${{ env.AWS_REGION }}

          aws secretsmanager put-secret-value \
            --secret-id buffett-dev-jwt-secret \
            --secret-string "${{ secrets.JWT_SECRET }}" \
            --region ${{ env.AWS_REGION }}

          # Create or update Pinecone API key (reusing staging key)
          aws secretsmanager describe-secret --secret-id buffett-dev-pinecone-api-key 2>/dev/null || \
          aws secretsmanager create-secret \
            --name buffett-dev-pinecone-api-key \
            --description "Pinecone API key for dev environment" \
            --region ${{ env.AWS_REGION }}

          aws secretsmanager put-secret-value \
            --secret-id buffett-dev-pinecone-api-key \
            --secret-string "${{ secrets.PINECONE_API_KEY }}" \
            --region ${{ env.AWS_REGION }}

          echo "✅ AWS Secrets Manager secrets created/updated successfully"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.1
          terraform_wrapper: false  # Needed to capture outputs

      - name: Terraform Init
        working-directory: chat-api/terraform/environments/dev
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Validate
        working-directory: chat-api/terraform/environments/dev
        run: terraform validate

      - name: Terraform Plan
        working-directory: chat-api/terraform/environments/dev
        run: |
          set +e
          terraform plan -out=tfplan \
            -var="google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -var="google_client_secret=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="pinecone_api_key=${{ secrets.PINECONE_API_KEY }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -detailed-exitcode
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 0 ] || [ $EXIT_CODE -eq 2 ]; then
            echo "Terraform plan succeeded"
            exit 0
          else
            echo "Terraform plan failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Terraform Apply
        working-directory: chat-api/terraform/environments/dev
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        id: terraform-output
        working-directory: chat-api/terraform/environments/dev
        run: |
          HTTP_ENDPOINT=$(terraform output -raw http_api_endpoint)
          WS_ENDPOINT=$(terraform output -raw websocket_api_endpoint)

          echo "http_api_endpoint=$HTTP_ENDPOINT" >> $GITHUB_OUTPUT
          echo "websocket_api_endpoint=$WS_ENDPOINT" >> $GITHUB_OUTPUT

          echo "📡 API Endpoints:"
          echo "  HTTP API: $HTTP_ENDPOINT"
          echo "  WebSocket: $WS_ENDPOINT"

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Create dev environment file
        working-directory: frontend
        run: |
          cat > .env.dev << EOF
          VITE_REST_API_URL=${{ needs.deploy-infrastructure.outputs.http_api_endpoint }}
          VITE_WEBSOCKET_URL=${{ needs.deploy-infrastructure.outputs.websocket_api_endpoint }}
          VITE_ENVIRONMENT=dev
          VITE_ENABLE_DEBUG_LOGS=true
          VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          EOF

          echo "✅ Created .env.dev with API endpoints"
          cat .env.dev

      - name: Build frontend
        working-directory: frontend
        run: npm run build -- --mode dev

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  deploy-frontend:
    name: Deploy Frontend to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: [build-frontend]

    steps:
      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync HTML files to S3 (no cache)
        run: |
          aws s3 sync frontend/dist s3://${{ secrets.DEV_S3_FRONTEND_BUCKET }}/ \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=0, must-revalidate" \
            --metadata-directive REPLACE

          echo "✅ HTML files synced with no-cache headers"

      - name: Sync static assets to S3 (long-term cache)
        run: |
          aws s3 sync frontend/dist s3://${{ secrets.DEV_S3_FRONTEND_BUCKET }}/ \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --metadata-directive REPLACE

          echo "✅ Static assets synced with long-term cache headers"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

          echo "✅ CloudFront cache invalidation initiated"

      - name: Print deployment URL
        run: |
          echo "🚀 Frontend deployed successfully!"
          echo "📡 URL: ${{ secrets.DEV_CLOUDFRONT_URL }}"
          echo ""
          echo "Note: CloudFront cache invalidation may take 1-2 minutes to complete."

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure, build-frontend, deploy-frontend]
    if: always()

    steps:
      - name: Print deployment summary
        run: |
          echo "🚀 Dev Deployment Summary"
          echo "=============================="
          echo ""
          echo "Environment: dev"
          echo "HTTP API: ${{ needs.deploy-infrastructure.outputs.http_api_endpoint }}"
          echo "WebSocket: ${{ needs.deploy-infrastructure.outputs.websocket_api_endpoint }}"
          echo "Frontend: ${{ secrets.DEV_CLOUDFRONT_URL }}"
          echo ""
          echo "✅ Backend infrastructure deployed"
          echo "✅ Lambda functions deployed"
          echo "✅ Frontend built and deployed to CloudFront"
          echo ""
          echo "📋 Next Steps:"
          echo "1. Visit ${{ secrets.DEV_CLOUDFRONT_URL }} to test the application"
          echo "2. Check CloudWatch logs for any issues"
          echo "3. When ready, merge to staging branch for staging deployment"
          echo ""
          echo "🔍 To check deployment:"
          echo "   curl ${{ needs.deploy-infrastructure.outputs.http_api_endpoint }}/health"
