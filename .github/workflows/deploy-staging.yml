name: Deploy to Staging

on:
  push:
    branches:
      - staging  # Auto-deploy when pushing to staging branch
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: staging
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: chat-api/backend
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: chat-api/backend
        run: python -m pytest tests/ -v --ignore=tests/e2e --ignore=tests/integration --ignore=tests/performance --ignore=tests/test_action_group_handler.py --ignore=tests/test_conversation.py --ignore=tests/test_new_conversation.py

  build-backend:
    name: Build Backend Lambda Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Lambda Layer
        working-directory: chat-api/backend
        run: |
          chmod +x scripts/build_layer.sh
          ./scripts/build_layer.sh

      - name: Build Lambda packages
        working-directory: chat-api/backend
        run: |
          chmod +x scripts/build_lambdas.sh
          ./scripts/build_lambdas.sh

      - name: Upload Lambda packages
        uses: actions/upload-artifact@v4
        with:
          name: lambda-packages
          path: chat-api/backend/build/*.zip
          retention-days: 1

  deploy-infrastructure:
    name: Deploy Infrastructure with Terraform
    runs-on: ubuntu-latest
    needs: [test-backend, build-backend]

    outputs:
      http_api_endpoint: ${{ steps.terraform-output.outputs.http_api_endpoint }}
      research_function_url: ${{ steps.terraform-output.outputs.research_function_url }}
      followup_function_url: ${{ steps.terraform-output.outputs.followup_function_url }}
      market_intel_url: ${{ steps.terraform-output.outputs.market_intel_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Lambda packages
        uses: actions/download-artifact@v4
        with:
          name: lambda-packages
          path: chat-api/backend/build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create/Update Secrets in AWS Secrets Manager
        run: |
          # Create or update Google OAuth secret
          aws secretsmanager describe-secret --secret-id buffett-staging-google-oauth 2>/dev/null || \
          aws secretsmanager create-secret \
            --name buffett-staging-google-oauth \
            --description "Google OAuth credentials for staging environment" \
            --region ${{ env.AWS_REGION }}

          aws secretsmanager put-secret-value \
            --secret-id buffett-staging-google-oauth \
            --secret-string "{\"client_id\":\"${{ secrets.GOOGLE_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.GOOGLE_CLIENT_SECRET }}\"}" \
            --region ${{ env.AWS_REGION }}

          # Create or update JWT secret
          aws secretsmanager describe-secret --secret-id buffett-staging-jwt-secret 2>/dev/null || \
          aws secretsmanager create-secret \
            --name buffett-staging-jwt-secret \
            --description "JWT signing secret for staging environment" \
            --region ${{ env.AWS_REGION }}

          aws secretsmanager put-secret-value \
            --secret-id buffett-staging-jwt-secret \
            --secret-string "${{ secrets.JWT_SECRET }}" \
            --region ${{ env.AWS_REGION }}

          echo "✅ AWS Secrets Manager secrets created/updated successfully"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.1
          terraform_wrapper: false  # Needed to capture outputs

      - name: Terraform Init
        working-directory: chat-api/terraform/environments/staging
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Validate
        working-directory: chat-api/terraform/environments/staging
        run: terraform validate

      - name: Terraform Plan
        working-directory: chat-api/terraform/environments/staging
        run: |
          set +e
          terraform plan -out=tfplan \
            -var="google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -var="google_client_secret=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -var="basic_auth_credentials=${{ secrets.BASIC_AUTH_CREDENTIALS }}" \
            -detailed-exitcode
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 0 ] || [ $EXIT_CODE -eq 2 ]; then
            echo "Terraform plan succeeded"
            exit 0
          else
            echo "Terraform plan failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Terraform Apply
        working-directory: chat-api/terraform/environments/staging
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        id: terraform-output
        working-directory: chat-api/terraform/environments/staging
        run: |
          HTTP_ENDPOINT=$(terraform output -raw http_api_endpoint)
          RESEARCH_URL=$(terraform output -raw investment_research_function_url)
          FOLLOWUP_URL=$(terraform output -raw analysis_followup_function_url)
          MARKET_INTEL_URL=$(terraform output -raw market_intel_chat_url)

          echo "http_api_endpoint=$HTTP_ENDPOINT" >> $GITHUB_OUTPUT
          echo "research_function_url=$RESEARCH_URL" >> $GITHUB_OUTPUT
          echo "followup_function_url=$FOLLOWUP_URL" >> $GITHUB_OUTPUT
          echo "market_intel_url=$MARKET_INTEL_URL" >> $GITHUB_OUTPUT

          echo "📡 API Endpoints:"
          echo "  HTTP API: $HTTP_ENDPOINT"
          echo "  Research Lambda: $RESEARCH_URL"
          echo "  Followup Lambda: $FOLLOWUP_URL"
          echo "  Market Intel: $MARKET_INTEL_URL"

  build-docker-lambdas:
    name: Build Docker Lambda - ${{ matrix.lambda.name }}
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure]
    strategy:
      fail-fast: false
      matrix:
        lambda:
          - name: investment-research
            dockerfile_dir: chat-api/backend/lambda/investment_research
            ecr_repo: buffett/investment-research

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.lambda.dockerfile_dir }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.lambda.ecr_repo }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.lambda.ecr_repo }}:latest
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=staging-${{ matrix.lambda.name }}
          cache-to: type=gha,mode=max,scope=staging-${{ matrix.lambda.name }}
          provenance: false

      - name: Update Lambda function
        run: |
          FUNCTION_NAME="buffett-staging-${{ matrix.lambda.name }}"
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ matrix.lambda.ecr_repo }}:${{ github.sha }}"

          aws lambda update-function-code \
            --function-name $FUNCTION_NAME \
            --image-uri $IMAGE_URI \
            --region ${{ env.AWS_REGION }}

          aws lambda wait function-updated \
            --function-name $FUNCTION_NAME \
            --region ${{ env.AWS_REGION }}

          echo "Lambda $FUNCTION_NAME updated with image: $IMAGE_URI"

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure]  # Removed test-frontend dependency (tests disabled)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Create staging environment file
        working-directory: frontend
        run: |
          cat > .env.staging << EOF
          VITE_APP_NAME=Buffett
          VITE_REST_API_URL=${{ needs.deploy-infrastructure.outputs.http_api_endpoint }}
          VITE_RESEARCH_API_URL=${{ needs.deploy-infrastructure.outputs.http_api_endpoint }}
          VITE_RESEARCH_LAMBDA_URL=${{ needs.deploy-infrastructure.outputs.research_function_url }}
          VITE_ANALYSIS_FOLLOWUP_URL=${{ needs.deploy-infrastructure.outputs.followup_function_url }}
          VITE_MARKET_INTEL_URL=${{ needs.deploy-infrastructure.outputs.market_intel_url }}
          VITE_ENVIRONMENT=staging
          VITE_ENABLE_DEBUG_LOGS=false
          VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_ENABLE_WAITLIST=false
          EOF

          echo "✅ Created .env.staging with API endpoints"
          cat .env.staging

      - name: Build frontend
        working-directory: frontend
        run: npm run build -- --mode staging

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  deploy-frontend:
    name: Deploy Frontend to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: [build-frontend]

    steps:
      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync HTML files to S3 (no cache)
        run: |
          aws s3 sync frontend/dist s3://${{ secrets.S3_FRONTEND_BUCKET }}/ \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=0, must-revalidate" \
            --metadata-directive REPLACE

          echo "✅ HTML files synced with no-cache headers"

      - name: Sync static assets to S3 (long-term cache)
        run: |
          aws s3 sync frontend/dist s3://${{ secrets.S3_FRONTEND_BUCKET }}/ \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --metadata-directive REPLACE

          echo "✅ Static assets synced with long-term cache headers"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

          echo "✅ CloudFront cache invalidation initiated"

      - name: Print deployment URL
        run: |
          echo "🚀 Frontend deployed successfully!"
          echo "📡 URL: ${{ secrets.CLOUDFRONT_URL }}"
          echo ""
          echo "Note: CloudFront cache invalidation may take 1-2 minutes to complete."

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure, build-docker-lambdas, build-frontend, deploy-frontend]
    if: always()

    steps:
      - name: Print deployment summary
        run: |
          echo "🚀 Staging Deployment Summary"
          echo "=============================="
          echo ""
          echo "Environment: staging"
          echo "HTTP API: ${{ needs.deploy-infrastructure.outputs.http_api_endpoint }}"
          echo "Research Lambda: ${{ needs.deploy-infrastructure.outputs.research_function_url }}"
          echo "Market Intel: ${{ needs.deploy-infrastructure.outputs.market_intel_url }}"
          echo "Frontend: ${{ secrets.CLOUDFRONT_URL }}"
          echo ""
          echo "✅ Backend infrastructure deployed"
          echo "✅ Lambda functions deployed"
          echo "✅ Docker Lambdas built and pushed"
          echo "✅ Frontend built and deployed to CloudFront"
          echo ""
          echo "📋 Next Steps:"
          echo "1. Visit ${{ secrets.CLOUDFRONT_URL }} to test the application"
          echo "2. Share CloudFront URL with friends and family"
          echo "3. Monitor CloudWatch logs for any issues"
          echo ""
          echo "🔍 To check deployment:"
          echo "   curl ${{ needs.deploy-infrastructure.outputs.http_api_endpoint }}/health"
