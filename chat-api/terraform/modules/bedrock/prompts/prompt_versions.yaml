# Prompt Version Registry for A/B Testing
#
# Usage:
#   python prediction_ensemble_local/interactive.py AAPL --version 6
#   python prediction_ensemble_local/interactive.py AAPL --version 5  # default
#
# Version History:
#   v5: Original detailed prompts with metric reference tables (79-124 lines each)
#   v6: Simplified prompts without metric cheat sheets (25-35 lines each)
#
# A/B Testing Guidelines:
#   1. Run same ticker with both versions
#   2. Compare output quality, token usage, and adherence to structure
#   3. Document findings in test_outputs/ab_test_results.md

versions:
  5:
    description: "Detailed prompts with metric reference tables"
    released: "2024-12-01"
    status: "production"
    files:
      debt: "value_investor_debt_v5.txt"
      cashflow: "value_investor_cashflow_v5.txt"
      growth: "value_investor_growth_v5.txt"
      supervisor: "supervisor_instruction_v5.txt"
    characteristics:
      - Includes full metric reference tables
      - Data format warnings and caveats
      - Market cycle lens explanations
      - ~80-125 lines per prompt
    token_estimate:
      system_prompt: "~1500-2000 tokens per agent"

  6:
    description: "Simplified prompts - model knows finance"
    released: "2025-01-15"
    status: "testing"
    files:
      debt: "value_investor_debt_v6.txt"
      cashflow: "value_investor_cashflow_v6.txt"
      growth: "value_investor_growth_v6.txt"
      supervisor: "supervisor_instruction_v6.txt"
    characteristics:
      - No metric reference tables (model knows these)
      - Removed data format warnings
      - Focus on core questions and output structure
      - ~25-35 lines per prompt
    token_estimate:
      system_prompt: "~400-600 tokens per agent"
    changes_from_v5:
      - Removed: Metric reference tables (14 lines each)
      - Removed: "CRITICAL: Data Format Notes" sections
      - Removed: "call FinancialAnalysis action group" (legacy)
      - Simplified: Analysis framework to core questions
      - Kept: Output structure exactly the same

# Default version for production
default: 5

# Test configuration
ab_test:
  enabled: true
  test_tickers:
    - AAPL  # Strong balance sheet, should be straightforward
    - MSFT  # Growth story, test moat detection
    - F     # High debt, test debt expert sensitivity
    - NVDA  # Volatile growth, test velocity metrics
  metrics_to_compare:
    - output_adherence_to_structure
    - analysis_depth
    - ml_model_comparison_quality
    - token_usage
    - response_time
