openapi: 3.0.0
info:
  title: Value Investor Analysis Action Group API
  version: 1.0.0
  description: |
    Simplified financial analysis API for value investor agents.
    Returns ML predictions and top 10 metrics per agent with 5-year quarterly history.
    Designed for Buffett/Graham-style analysis.

paths:
  /analyze:
    post:
      operationId: getFinancialAnalysis
      summary: Get value investor financial analysis with ML predictions
      description: |
        Fetches financial data for a ticker and runs ML inference to generate
        predictions with confidence scores. Returns:

        1. **ML Model Inference**: SELL/HOLD/BUY predictions with confidence intervals
        2. **Value Metrics**: Top 10 metrics per agent over 20 quarters (5 years)

        Metrics are selected based on Buffett/Graham value investing principles:
        - Debt: Leverage ratios, liquidity, deleveraging trends
        - Cashflow: FCF quality, cash conversion, capital allocation
        - Growth: Returns on capital, margins, earnings quality
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ticker
              properties:
                ticker:
                  type: string
                  description: Stock ticker symbol (e.g., AAPL, MSFT, NVO)
                  example: "AAPL"
                  pattern: "^[A-Za-z]{1,5}$"
                analysis_type:
                  type: string
                  description: |
                    Type of analysis to perform:
                    - 'debt': Balance sheet strength, leverage, liquidity
                    - 'cashflow': Cash generation quality, capital allocation
                    - 'growth': Earnings quality, margins, returns on capital
                    - 'all': Full ensemble analysis with all 3 models
                  enum:
                    - debt
                    - cashflow
                    - growth
                    - all
                  default: "all"
                  example: "debt"
                skip_inference:
                  type: boolean
                  description: |
                    Skip ML inference and return only value_metrics.
                    Use when inference results are provided externally (pre-computed).
                  default: false
                  example: true
      responses:
        '200':
          description: Analysis completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValueInvestorResponse'
        '400':
          description: Invalid input parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ValueInvestorResponse:
      type: object
      required:
        - ticker
        - analysis_type
        - model_inference
        - value_metrics
        - metadata
      properties:
        ticker:
          type: string
          description: Stock ticker that was analyzed
          example: "AAPL"
        analysis_type:
          type: string
          description: Type of analysis performed
          enum: [debt, cashflow, growth, all]
        model_inference:
          type: object
          description: |
            ML model predictions for each analyzed dimension.
            Contains prediction (SELL/HOLD/BUY), confidence score, and probability distribution.
          additionalProperties:
            $ref: '#/components/schemas/ModelInference'
        value_metrics:
          $ref: '#/components/schemas/ValueMetrics'
        metadata:
          $ref: '#/components/schemas/AnalysisMetadata'

    ModelInference:
      type: object
      description: ML model prediction output
      required:
        - prediction
        - confidence
        - probabilities
      properties:
        prediction:
          type: string
          description: Model's recommendation signal
          enum: [SELL, HOLD, BUY]
          example: "HOLD"
        confidence:
          type: number
          description: Confidence score (0.0 to 1.0)
          minimum: 0
          maximum: 1
          example: 0.68
        ci_width:
          type: number
          description: Confidence interval width (lower = more certain)
          minimum: 0
          maximum: 1
          example: 0.42
        confidence_interpretation:
          type: string
          description: Human-readable confidence level
          enum: [STRONG, MODERATE, WEAK]
          example: "MODERATE"
        probabilities:
          type: object
          description: Probability distribution across signals
          properties:
            SELL:
              type: number
              example: 0.15
            HOLD:
              type: number
              example: 0.52
            BUY:
              type: number
              example: 0.33
        error:
          type: string
          description: Error message if inference failed

    ValueMetrics:
      type: object
      description: |
        Top 10 value investor metrics per agent over 20 quarters (5 years).
        Each metric is an array of 20 values aligned with the quarters array.
        Index 0 = most recent quarter.
      properties:
        # Debt Agent - Top 10 Value Investor Metrics
        debt_to_equity:
          type: array
          items:
            type: number
          description: |
            Total debt / Total equity ratio. Prefer < 0.5, concern > 1.0.
            Lower indicates conservative financing.
        interest_coverage:
          type: array
          items:
            type: number
          description: |
            EBIT / Interest expense. Require > 8x for safety.
            Higher indicates better debt service ability.
        current_ratio:
          type: array
          items:
            type: number
          description: |
            Current assets / Current liabilities. Prefer > 2.0.
            Measures short-term liquidity.
        quick_ratio:
          type: array
          items:
            type: number
          description: |
            (Current assets - Inventory) / Current liabilities. Prefer > 1.0.
            Acid test for immediate liquidity.
        net_debt:
          type: array
          items:
            type: number
          description: |
            Total debt minus cash. Negative = net cash position.
            True debt burden on the business.
        net_debt_to_ebitda:
          type: array
          items:
            type: number
          description: |
            Net debt / EBITDA. Prefer < 3x.
            Years to pay off debt at current earnings.
        total_equity:
          type: array
          items:
            type: number
          description: |
            Shareholders' equity (book value).
            Track growth over time for value creation.
        debt_to_equity_trend_2yr:
          type: array
          items:
            type: number
          description: |
            2-year trend slope of debt-to-equity ratio.
            Negative = deleveraging (improving).
        current_ratio_trend_1yr:
          type: array
          items:
            type: number
          description: |
            1-year trend slope of current ratio.
            Positive = improving liquidity.
        is_deleveraging:
          type: array
          items:
            type: integer
          description: |
            Binary flag: 1 if company reducing debt, 0 otherwise.
            Indicates active debt reduction strategy.

        # Cashflow Agent - Top 10 Value Investor Metrics
        operating_cash_flow:
          type: array
          items:
            type: number
          description: |
            Cash from operations. Core cash generation ability.
            Should be positive consistently.
        free_cash_flow:
          type: array
          items:
            type: number
          description: |
            Operating cash flow minus CapEx. Owner earnings proxy.
            Prefer positive in 4-5 of 5 years.
        fcf_margin:
          type: array
          items:
            type: number
          description: |
            Free cash flow / Revenue. Prefer > 15%.
            Measures cash efficiency of business.
        fcf_to_net_income:
          type: array
          items:
            type: number
          description: |
            FCF / Net income. Prefer > 0.8 (80%).
            Earnings quality - cash backing reported profits.
        ocf_to_revenue:
          type: array
          items:
            type: number
          description: |
            Operating cash flow / Revenue. Prefer > 20%.
            Cash conversion efficiency.
        capex_intensity:
          type: array
          items:
            type: number
          description: |
            CapEx / Revenue. Prefer < 15%.
            Low-capex businesses are capital-efficient.
        dividend_payout:
          type: array
          items:
            type: number
          description: |
            Dividends paid to shareholders.
            Part of capital allocation analysis.
        share_buybacks:
          type: array
          items:
            type: number
          description: |
            Stock repurchases. Only good if P/E < 15.
            Part of capital allocation analysis.
        fcf_margin_trend_1yr:
          type: array
          items:
            type: number
          description: |
            1-year trend slope of FCF margin.
            Positive = improving cash generation.
        capex_intensity_trend:
          type: array
          items:
            type: number
          description: |
            Trend in CapEx/Revenue over time.
            Negative = becoming more capital-efficient.

        # Growth Agent - Top 10 Value Investor Metrics
        roe:
          type: array
          items:
            type: number
          description: |
            Return on equity. Prefer > 15%.
            Net income / Shareholders' equity.
        roic:
          type: array
          items:
            type: number
          description: |
            Return on invested capital. Must exceed cost of capital.
            True measure of capital efficiency.
        gross_margin:
          type: array
          items:
            type: number
          description: |
            Gross profit / Revenue. High margins (> 40%) indicate moat.
            Pricing power indicator.
        operating_margin:
          type: array
          items:
            type: number
          description: |
            Operating income / Revenue. Prefer > 20%.
            Core business profitability.
        net_margin:
          type: array
          items:
            type: number
          description: |
            Net income / Revenue. Prefer > 15%.
            Bottom-line profitability.
        revenue_growth_yoy:
          type: array
          items:
            type: number
          description: |
            Year-over-year revenue growth rate.
            Track consistency over 5 years.
        eps_growth_yoy:
          type: array
          items:
            type: number
          description: |
            Year-over-year EPS growth.
            Shareholder value creation.
        revenue_cagr_2yr:
          type: array
          items:
            type: number
          description: |
            2-year compound annual growth rate of revenue.
            Smoothed growth trajectory.
        operating_margin_trend_2yr:
          type: array
          items:
            type: number
          description: |
            2-year trend slope of operating margin.
            Positive = expanding profitability.
        roe_trend_2yr:
          type: array
          items:
            type: number
          description: |
            2-year trend slope of ROE.
            Positive = improving returns on equity.

        # Metadata
        quarters:
          type: array
          items:
            type: string
          description: |
            Calendar quarter labels (e.g., "Q3 2024", "Q2 2024", ..., "Q4 2019").
            Index 0 = most recent quarter.
          example: ["Q3 2024", "Q2 2024", "Q1 2024", "Q4 2023"]

    AnalysisMetadata:
      type: object
      properties:
        quarters_analyzed:
          type: integer
          description: Number of quarters of data available
          example: 20
        processing_time_ms:
          type: number
          description: Time to process request in milliseconds
        timestamp:
          type: string
          format: date-time
          description: When analysis was performed
        data_source:
          type: string
          description: Source of financial data
          example: "FMP"
        model_version:
          type: string
          description: Schema and model version
          example: "v1.0.0"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message
        timestamp:
          type: string
          format: date-time
